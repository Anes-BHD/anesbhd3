plugins {
    id 'java'
	id 'jacoco'
}

repositories {
    // Remplacez jcenter() par la ligne ci-dessous
    mavenCentral()
}

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.12'
}
jacocoTestReport {
    reports {
        // Remplacez xml.enabled par xml.required
        xml.required = true
        html.required = true
    }
}
