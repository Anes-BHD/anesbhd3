plugins {
    id 'java'
	id 'jacoco'
	id 'application'
}
application {
    // Remplacez par le nom complet : 'nom_du_package.App'
    // Si vous n'avez pas de package, laissez 'App' mais vérifiez l'emplacement du fichier
    mainClass = 'anesbhd3.App' 
}
repositories {
    // Remplacez jcenter() par la ligne ci-dessous
    mavenCentral()
}

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.12'
}
jacocoTestReport {
    reports {
        // Remplacez xml.enabled par xml.required
        xml.required = true
        html.required = true
    }
}
